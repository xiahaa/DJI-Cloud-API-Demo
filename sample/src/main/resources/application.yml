server:
  port: 6789
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: cloud-api-sample
  datasource:
    druid:
      type: com.alibaba.druid.pool.DruidDataSource
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/cloud_sample?useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: silas@2026
      initial-size: 10
      min-idle: 10
      max-active: 20
      max-wait: 60000

  redis:
    host: 172.18.17.34
    port: 6379
    database: 0
    username: # if you enable
    password:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

jwt:
  issuer: DJI
  subject: CloudApiSample
  secret: CloudApiSample
  age: 86400

mqtt:
  # @see com.dji.sample.component.mqtt.model.MqttUseEnum
  # BASIC parameters are required.
  BASIC:
    protocol: MQTT # @see com.dji.sample.component.mqtt.model.MqttProtocolEnum
    host: 172.18.17.34
    port: 1883
    username: pilot
    password: pilot123
    client-id: 123456
    # If the protocol is ws/wss, this value is required.
#    path:
  # ---------- 以下为仓库原始 DRC 配置模板（保留为注释，勿删）----------
#  DRC:
#    protocol: WS # @see com.dji.sample.component.mqtt.model.MqttProtocolEnum
#    host: Please enter your ip.
#    port: 8083
#    path: /mqtt
#    username: JavaServer
#    password: 123456
  # ---------- 当前环境实际启用的 DRC（解决 drc/connect 缺少 mqtt.DRC）----------
  # 说明：与 BASIC 使用同一 EMQX（tcp 1883）时，Pilot 侧以 connect 接口返回的 address + JWT 密码为准；
  # 若你现场 DRC 走 WebSocket，请改为注释中的 WS 形态，并同步修改 host/port/path。
  DRC:
    protocol: MQTT
    host: 172.18.17.34
    port: 1883
    username: pilot
    password: pilot123
    client-id: drc-placeholder
    # protocol: WS
    # port: 8083
    # path: /mqtt

cloud-sdk:
  mqtt:
    # Topics that need to be subscribed when initially connecting to mqtt, multiple topics are divided by ",".
    inbound-topic: sys/product/+/status,thing/product/+/requests

url:
  manage:
    prefix: manage
    version: /api/v1
  map:
    prefix: map
    version: /api/v1
  media:
    prefix: media
    version: /api/v1
  wayline:
    prefix: wayline
    version: /api/v1
  storage:
    prefix: storage
    version: /api/v1
  control:
    prefix: control
    version: /api/v1


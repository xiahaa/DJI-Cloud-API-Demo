# Pull one frame from RTMP periodically and publish raw JPEG bytes to MQTT (needs ffmpeg on PATH).
# 开启前：1) Pilot 已在推流的地址与 rtmp-url 一致（常见 rtmp://host:1935/live/<流名>） 2) EMQX 等需允许本消息大小（JPEG 可能数百 KB）
# 3) interval-ms 不宜过小，否则每秒起一个 ffmpeg 进程，CPU 会高
silas:
  live:
    image-publisher:
      enabled: true


      # 与 Pilot / 推流端实际地址一致；无端口时默认 1935
      rtmp-url: rtmp://172.18.17.34:1935/live/test/123
      topic: silas/live/image
      interval-ms: 1000
      initial-delay-ms: 5000
      qos: 0
      ffmpeg-timeout-ms: 4000